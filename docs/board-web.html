<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chess 5x8 Board</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --panel: #16213e;
        --border: #2a2a4a;
        --accent: #e0c88a;
        --light: #f0d9b5;
        --dark: #b58863;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: #eee;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      .wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 18px 14px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
        width: min(520px, 94vw);
      }

      h1 {
        margin: 0 0 12px 0;
        font-size: 1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
      }

      .board-wrap {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: center;
      }

      .ranks {
        display: flex;
        flex-direction: column;
      }

      .rank {
        height: 64px;
        width: 22px;
        display: grid;
        place-items: center;
        font-size: 0.85rem;
        color: #9aa0b5;
        font-weight: 700;
      }

      .board-col {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(5, 64px);
        grid-template-rows: repeat(8, 64px);
        border: 2px solid #333;
        border-radius: 6px;
        overflow: hidden;
        background: #000;
      }

      .square {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
      }

      .square.light {
        background: var(--light);
      }
      .square.dark {
        background: var(--dark);
      }

      .square img {
        width: 56px;
        height: 56px;
        display: block;
        user-select: none;
        pointer-events: none;
      }

      .files {
        display: flex;
        width: 320px;
      }

      .file {
        width: 64px;
        text-align: center;
        font-size: 0.85rem;
        color: #9aa0b5;
        font-weight: 700;
      }

      .note {
        margin-top: 10px;
        font-size: 0.82rem;
        color: #aab2c8;
      }
      code {
        color: #fff;
      }
    </style>
  </head>
